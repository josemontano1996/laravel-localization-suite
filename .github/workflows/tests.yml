on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.4', '8.5']
    name: PHP ${{ matrix.php }}
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite3, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv, imagick, fileinfo
      - run: composer install --no-interaction --prefer-dist
      - run: composer rector
      - run: composer lint
      - run: composer test

  integration-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        runtime: [native, context, swoole-concurrent, open-swoole-concurrent]
        php: ['8.4', '8.5']
        exclude:
          - runtime: swoole-concurrent
            php: '8.5'
          - runtime: open-swoole-concurrent
            php: '8.5'
    name: ${{ matrix.runtime }} (PHP ${{ matrix.php }})
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite3, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv, imagick, fileinfo, ${{ matrix.runtime == 'open-swoole-concurrent' && 'openswoole' || 'swoole' }}
      - name: Run Integration Test
        working-directory: tests/Integration/runtimes/${{ matrix.runtime }}
        run: |
          chmod +x test.sh
          ./test.sh

  # This is the "Magic" job you select in GitHub Settings
  all-tests-passed:
    name: "Tests"
    runs-on: ubuntu-latest
    needs: [test, integration-tests]
    steps:
      - run: exit 0